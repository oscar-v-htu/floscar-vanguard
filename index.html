<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,follow">
    <meta name="description" content="Clean welcome sequence for Floscar Vanguard.">
    <meta name="theme-color" content="#020406">
    <link rel="icon" href="AI.jpg" type="image/jpeg">
    <title>FLOSCAR VANGUARD | Welcome</title>
    <style>
        :root {
            --bg: #020406;
            --bg-soft: #071514;
            --panel: rgba(7, 20, 18, 0.85);
            --neon: #7bffbf;
            --neon-glow: rgba(123, 255, 191, 0.4);
            --cyan: #7fe7ff;
            --text: #effff4;
            --text-dim: #b0c8bb;
            --line: rgba(123, 255, 191, 0.12);
            --line-strong: rgba(123, 255, 191, 0.3);
            --font-mono: 'Courier New', Courier, monospace;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            overflow: hidden;
        }

        /* --- BACKGROUND ARCHITECTURE --- */
        .page-shell {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, var(--bg-soft), var(--bg));
            perspective: 1000px;
        }

        .ambient {
            position: absolute;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .ambient-left { top: -10%; left: -5%; background: var(--neon); }
        .ambient-right { bottom: -10%; right: -5%; background: var(--cyan); animation-delay: -5s; }

        .overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle, black 20%, transparent 90%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- CORE INTERFACE --- */
        .welcome-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 640px;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s forwards 0.3s;
        }

        .brand-symbol {
            display: inline-block;
            margin-bottom: 40px;
            text-decoration: none;
        }

        .brand-glyph {
            width: 50px;
            height: 50px;
            border: 1px solid var(--neon);
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(123, 255, 191, 0.05);
            box-shadow: 0 0 15px var(--neon-glow);
            transition: var(--transition);
        }

        .brand-glyph span {
            width: 12px;
            height: 12px;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
        }

        .brand-symbol:hover .brand-glyph {
            transform: rotate(135deg) scale(1.1);
            background: var(--neon);
            box-shadow: 0 0 30px var(--neon);
        }

        .brand-symbol:hover .brand-glyph span {
            background: var(--bg);
        }

        .eyebrow {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .logo-text {
            font-size: clamp(2.2rem, 10vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.01em;
            margin: 0 0 24px 0;
            text-transform: uppercase;
            line-height: 1;
        }

        .logo-text span {
            display: block;
            color: transparent;
            -webkit-text-stroke: 1px var(--text);
            opacity: 0.5;
        }

        .description {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 40px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- ENTRY CARD --- */
        .entry-card {
            background: var(--panel);
            border: 1px solid var(--line-strong);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px var(--line);
        }

        .entry-copy {
            font-size: 0.85rem;
            margin-bottom: 30px;
            color: var(--text);
            opacity: 0.9;
            letter-spacing: 0.05em;
        }

        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .primary-btn, .secondary-btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-decoration: none;
            transition: var(--transition);
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
        }

        .primary-btn {
            background: var(--neon);
            color: var(--bg);
            border: 1px solid var(--neon);
        }

        .primary-btn:hover {
            background: transparent;
            color: var(--neon);
            box-shadow: 0 0 25px var(--neon-glow);
        }

        .secondary-btn {
            border: 1px solid var(--line-strong);
            color: var(--text);
            background: rgba(255, 255, 255, 0.02);
        }

        .secondary-btn:hover {
            border-color: var(--cyan);
            background: rgba(127, 231, 255, 0.08);
            box-shadow: 0 0 20px rgba(127, 231, 255, 0.1);
        }

        /* --- STATUS BAR --- */
        .status-bar {
            margin-top: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .pulse {
            width: 6px;
            height: 6px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon);
            animation: pulse-ring 2s infinite ease-out;
        }

        /* --- ANIMATIONS --- */
        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(5%, 5%); }
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px var(--neon); }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        @media (max-width: 480px) {
            .actions { flex-direction: column; }
            .primary-btn, .secondary-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="page-shell">
        <div class="ambient ambient-left"></div>
        <div class="ambient ambient-right"></div>
        <div class="overlay" aria-hidden="true"></div>

        <main class="welcome-container">
            <a class="brand-symbol" href="home.html" aria-label="Home">
                <div class="brand-glyph" aria-hidden="true"><span></span></div>
            </a>

            <p class="eyebrow">Initializing / Entry Sequence</p>
            <h1 class="logo-text">FLOSCAR <span>VANGUARD</span></h1>
            
            <p class="description">
                A high-fidelity digital intelligence layer focused on AI strategy, neural architecture, and future research signals.
            </p>

            <div class="entry-card">
                <p class="entry-copy">
                    Select entry protocol to continue:
                </p>
                <div class="actions">
                    <a href="home.html" class="primary-btn">Enter Site</a>
                    <a href="trends.html" class="secondary-btn">Intelligence Stream</a>
                </div>
            </div>

            <div class="status-bar" aria-live="polite">
                <span class="pulse" id="status-pulse" aria-hidden="true"></span>
                <span class="status-text" id="status-copy">Signal live. Entry route locked.</span>
            </div>
        </main>
    </div>

    <script>
        /**
         * WELCOME LOGIC
         * Handles simple status changes to make the UI feel responsive.
         */
        document.addEventListener('DOMContentLoaded', () => {
            const statusText = document.getElementById('status-copy');
            const statusPulse = document.getElementById('status-pulse');
            const statuses = [
                "Signal live. Entry route locked.",
                "Neural link established.",
                "Data stream synchronized.",
                "Vanguard protocols active."
            ];
            
            let index = 0;

            // Cycle through status messages every 5 seconds
            setInterval(() => {
                index = (index + 1) % statuses.length;
                statusText.style.opacity = '0';
                
                setTimeout(() => {
                    statusText.textContent = statuses[index];
                    statusText.style.opacity = '1';
                    
                    // Small visual flair: change pulse color on certain messages
                    statusPulse.style.background = index % 2 === 0 ? '#7bffbf' : '#7fe7ff';
                    statusPulse.style.boxShadow = `0 0 10px ${index % 2 === 0 ? '#7bffbf' : '#7fe7ff'}`;
                }, 500);
            }, 5000);

            // Button Hover FX (JS fallback for extra polish)
            const btns = document.querySelectorAll('.primary-btn, .secondary-btn');
            btns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    console.log('Targeting: ' + btn.textContent);
                });
            });
        });
    </script>
</body>
</html>
