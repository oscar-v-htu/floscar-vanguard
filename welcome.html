<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="robots" content="noindex,follow">
	<meta name="description" content="Clean welcome sequence for Floscar Vanguard.">
	<meta name="theme-color" content="#061018">
	<link rel="canonical" href="https://www.floscarvanguard.com/">
	<link rel="icon" href="AI.jpg" type="image/jpeg">
	<link rel="manifest" href="site.webmanifest">
	<title>FLOSCAR VANGUARD | Welcome</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap');

		:root {
			--bg-deep: #03070c;
			--bg-mid: #081520;
			--line: rgba(145, 214, 255, 0.24);
			--line-strong: rgba(145, 214, 255, 0.36);
			--text: #f4f7fb;
			--muted: #afbfce;
			--accent: #74f7ff;
			--accent-strong: #c8fbff;
			--accent-warm: #ffd76a;
			--accent-hot: #ff8a5b;
			--panel: rgba(8, 18, 29, 0.78);
			--shadow: 0 32px 90px rgba(0, 0, 0, 0.44);
			--glow-cyan: rgba(116, 247, 255, 0.22);
			--glow-warm: rgba(255, 215, 106, 0.16);
			--glow-hot: rgba(255, 138, 91, 0.12);
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html {
			color-scheme: dark;
		}

		body {
			min-height: 100vh;
			font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 16% 14%, rgba(116, 247, 255, 0.28), transparent 24%),
				radial-gradient(circle at 84% 18%, rgba(255, 215, 106, 0.2), transparent 22%),
				radial-gradient(circle at 50% 84%, rgba(255, 138, 91, 0.12), transparent 26%),
				linear-gradient(135deg, #05111b 0%, #0a1824 44%, #010409 100%);
			overflow: hidden;
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background:
				linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
			background-size: 68px 68px;
			mask-image: radial-gradient(circle at center, black 46%, transparent 100%);
			pointer-events: none;
		}

		body::after {
			content: "";
			position: fixed;
			inset: 0;
			background:
				radial-gradient(circle at 50% 50%, rgba(116, 247, 255, 0.05), transparent 42%),
				linear-gradient(180deg, rgba(255, 255, 255, 0.015), transparent 24%, transparent 76%, rgba(255, 255, 255, 0.02));
			pointer-events: none;
		}

		body.is-ready .welcome-container,
		body.is-ready .welcome-container > * {
			opacity: 1;
			transform: translate3d(0, 0, 0);
		}

		.page-shell {
			position: relative;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 36px;
			isolation: isolate;
		}

		.brand-symbol {
			position: absolute;
			top: 28px;
			left: 28px;
			z-index: 2;
			display: grid;
			place-items: center;
			width: 74px;
			height: 74px;
			padding: 0;
			border: 1px solid rgba(116, 247, 255, 0.18);
			border-radius: 22px;
			background: linear-gradient(180deg, rgba(5, 14, 23, 0.88), rgba(6, 12, 18, 0.72));
			box-shadow: 0 0 20px rgba(116, 247, 255, 0.05);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			text-decoration: none;
			animation: symbolFloat 5.2s ease-in-out infinite;
			transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
		}

		.brand-symbol:hover,
		.brand-symbol:focus-visible {
			transform: translateY(-1px) scale(1.015);
			border-color: rgba(116, 247, 255, 0.26);
			box-shadow: 0 0 26px rgba(116, 247, 255, 0.08);
		}

		.brand-glyph {
			position: relative;
			width: 54px;
			height: 54px;
			border-radius: 16px;
			background:
				linear-gradient(135deg, rgba(116, 247, 255, 0.15), rgba(255, 215, 106, 0.06)),
				rgba(5, 14, 24, 0.9);
			border: 1px solid rgba(116, 247, 255, 0.22);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 16px rgba(116, 247, 255, 0.08);
			overflow: hidden;
			animation: glyphShift 5.2s ease-in-out infinite;
		}

		.brand-glyph::before,
		.brand-glyph::after {
			content: "";
			position: absolute;
			background: linear-gradient(180deg, var(--accent-strong), var(--accent));
			filter: drop-shadow(0 0 6px rgba(116, 247, 255, 0.22));
		}

		.brand-glyph::before {
			width: 14px;
			height: 30px;
			left: 13px;
			top: 12px;
			clip-path: polygon(0 0, 100% 0, 100% 18%, 38% 18%, 38% 100%, 0 100%);
		}

		.brand-glyph::after {
			width: 22px;
			height: 28px;
			right: 10px;
			top: 12px;
			clip-path: polygon(0 0, 28% 0, 100% 100%, 72% 100%);
		}

		.brand-glyph span {
			position: absolute;
			inset: 11px;
			border-top: 1px solid rgba(255, 215, 106, 0.26);
			border-right: 1px solid rgba(255, 215, 106, 0.18);
			transform: skew(-18deg);
			box-shadow: 0 0 12px rgba(255, 215, 106, 0.08);
		}

		.ambient {
			position: absolute;
			border-radius: 999px;
			filter: blur(22px);
			opacity: 0.78;
			pointer-events: none;
		}

		.ambient-left {
			width: 320px;
			height: 320px;
			top: 12%;
			left: 8%;
			background: radial-gradient(circle, rgba(116, 247, 255, 0.5), rgba(116, 247, 255, 0));
			animation: floatAmbient 9s ease-in-out infinite;
		}

		.ambient-right {
			width: 380px;
			height: 380px;
			right: 4%;
			bottom: 10%;
			background: radial-gradient(circle, rgba(255, 215, 106, 0.3), rgba(255, 215, 106, 0));
			animation: floatAmbient 11s ease-in-out infinite reverse;
		}

		.overlay {
			position: absolute;
			inset: 0;
			background:
				linear-gradient(transparent 0%, rgba(116, 247, 255, 0.05) 100%),
				radial-gradient(circle at center, rgba(116, 247, 255, 0.04), transparent 55%);
			pointer-events: none;
		}

		.welcome-container {
			position: relative;
			z-index: 1;
			width: min(760px, 100%);
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			padding: 42px 34px 32px;
			background:
				linear-gradient(180deg, rgba(7, 22, 36, 0.88) 0%, rgba(3, 9, 15, 0.96) 100%),
				radial-gradient(circle at top, rgba(116, 247, 255, 0.12), transparent 44%);
			border: 1px solid var(--line);
			border-radius: 28px;
			box-shadow: var(--shadow), 0 0 42px rgba(116, 247, 255, 0.05), 0 0 56px rgba(255, 215, 106, 0.03);
			backdrop-filter: blur(14px);
			-webkit-backdrop-filter: blur(14px);
			overflow: hidden;
			opacity: 0;
			transform: translate3d(0, 18px, 0) scale(0.99);
			transition: opacity 420ms ease, transform 620ms cubic-bezier(0.22, 1, 0.36, 1);
		}

		.welcome-container::before {
			content: "";
			position: absolute;
			inset: 0;
			border-radius: inherit;
			background:
				linear-gradient(135deg, rgba(116, 247, 255, 0.1), transparent 24%, transparent 76%, rgba(255, 215, 106, 0.1)),
				radial-gradient(circle at 20% 18%, rgba(116, 247, 255, 0.1), transparent 24%);
			pointer-events: none;
			mix-blend-mode: screen;
		}

		.welcome-container::after {
			content: "";
			position: absolute;
			inset: 0;
			border-radius: inherit;
			box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03), inset 0 0 28px rgba(116, 247, 255, 0.02);
			pointer-events: none;
		}

		.welcome-container > * {
			opacity: 0;
			transform: translate3d(0, 12px, 0);
			transition: opacity 320ms ease, transform 480ms cubic-bezier(0.22, 1, 0.36, 1);
		}

		.welcome-container > *:nth-child(1) { transition-delay: 70ms; }
		.welcome-container > *:nth-child(2) { transition-delay: 120ms; }
		.welcome-container > *:nth-child(3) { transition-delay: 170ms; }
		.welcome-container > *:nth-child(4) { transition-delay: 220ms; }
		.welcome-container > *:nth-child(5) { transition-delay: 270ms; }

		.eyebrow {
			position: relative;
			font-family: 'IBM Plex Mono', monospace;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			font-size: 0.76rem;
			color: var(--accent);
			margin-bottom: 16px;
			text-shadow: 0 0 14px rgba(116, 247, 255, 0.34);
		}

		.logo-text {
			position: relative;
			max-width: none;
			font-size: clamp(3rem, 7vw, 5.5rem);
			line-height: 0.9;
			letter-spacing: -0.05em;
			text-wrap: balance;
			color: #f7fbff;
			text-shadow: 0 0 24px rgba(116, 247, 255, 0.1), 0 0 36px rgba(255, 255, 255, 0.03);
		}

		.logo-text span {
			display: block;
			color: var(--accent);
			text-shadow: 0 0 18px rgba(116, 247, 255, 0.32), 0 0 36px rgba(116, 247, 255, 0.12), 0 0 12px rgba(255, 215, 106, 0.05);
		}

		.logo-text::after {
			content: "";
			position: absolute;
			left: 0.14em;
			bottom: -0.12em;
			width: 3.2em;
			height: 0.2em;
			border-radius: 999px;
			background: linear-gradient(90deg, rgba(116, 247, 255, 0), rgba(116, 247, 255, 0.98), rgba(255, 215, 106, 0.9), rgba(255, 138, 91, 0.7), rgba(116, 247, 255, 0));
			box-shadow: 0 0 20px rgba(116, 247, 255, 0.22), 0 0 32px rgba(255, 215, 106, 0.08);
			transform-origin: left center;
			animation: scanline 4.2s ease-in-out infinite;
		}

		.description {
			max-width: 40rem;
			margin-top: 20px;
			color: var(--muted);
			line-height: 1.65;
			font-size: 1rem;
			text-shadow: 0 0 12px rgba(116, 247, 255, 0.05);
		}

		.entry-card,
		.status-bar {
			background: linear-gradient(180deg, rgba(10, 23, 35, 0.92), rgba(6, 14, 22, 0.86));
			border: 1px solid var(--line);
			border-radius: 20px;
		}

		.entry-card {
			width: min(520px, 100%);
			margin-top: 28px;
			padding: 22px;
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 24px rgba(116, 247, 255, 0.07), 0 0 30px rgba(255, 215, 106, 0.03);
			position: relative;
		}

		.entry-card::before {
			content: "";
			position: absolute;
			inset: 0;
			border-radius: inherit;
			background: radial-gradient(circle at top, rgba(116, 247, 255, 0.08), transparent 58%);
			pointer-events: none;
		}

		.entry-copy {
			color: var(--muted);
			line-height: 1.6;
			font-size: 0.95rem;
			text-shadow: 0 0 10px rgba(116, 247, 255, 0.04);
		}

		.actions {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			gap: 14px;
			margin-top: 20px;
		}

		.primary-btn,
		.secondary-btn {
			position: relative;
			overflow: hidden;
			appearance: none;
			border-radius: 999px;
			padding: 14px 22px;
			font: inherit;
			font-weight: 500;
			letter-spacing: 0.01em;
			text-decoration: none;
			cursor: pointer;
			transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background-color 180ms ease;
		}

		.primary-btn::before,
		.secondary-btn::before {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.22) 50%, transparent 80%);
			transform: translateX(-120%);
			transition: transform 320ms ease;
			pointer-events: none;
		}

		.primary-btn {
			color: #031018;
			background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 54%, #fff1bf 100%);
			box-shadow: 0 14px 30px rgba(116, 247, 255, 0.22), 0 0 20px rgba(255, 215, 106, 0.08);
		}

		.secondary-btn {
			color: var(--text);
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
			border: 1px solid rgba(255, 255, 255, 0.12);
			box-shadow: 0 0 14px rgba(116, 247, 255, 0.04);
		}

		.primary-btn:hover,
		.secondary-btn:hover,
		.primary-btn:focus-visible,
		.secondary-btn:focus-visible {
			transform: translateY(-2px) scale(1.01);
		}

		.primary-btn:hover,
		.primary-btn:focus-visible {
			box-shadow: 0 18px 36px rgba(116, 247, 255, 0.28), 0 0 26px rgba(255, 215, 106, 0.12);
		}

		.secondary-btn:hover,
		.secondary-btn:focus-visible {
			border-color: rgba(116, 247, 255, 0.48);
			background: rgba(116, 247, 255, 0.1);
			box-shadow: 0 0 18px rgba(116, 247, 255, 0.06);
		}

		.primary-btn:hover::before,
		.primary-btn:focus-visible::before,
		.secondary-btn:hover::before,
		.secondary-btn:focus-visible::before {
			transform: translateX(120%);
		}

		.status-bar {
			width: min(420px, 100%);
			margin-top: 22px;
			padding: 12px 16px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			color: var(--muted);
			font-family: 'IBM Plex Mono', monospace;
			font-size: 0.8rem;
			letter-spacing: 0.08em;
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 18px rgba(116, 247, 255, 0.06);
		}

		.pulse {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			background: var(--accent-warm);
			box-shadow: 0 0 16px rgba(255, 215, 106, 0.72), 0 0 30px rgba(255, 138, 91, 0.18);
			animation: pulse 1.4s ease-in-out infinite;
		}

		.status-text {
			color: var(--text);
			text-shadow: 0 0 12px rgba(116, 247, 255, 0.08);
		}

		#redirect-count,
		#status-copy {
			color: var(--accent);
			font-family: 'IBM Plex Mono', monospace;
		}

		@keyframes blink {
			50% {
				opacity: 0;
			}
		}

		@keyframes pulse {
			0%,
			100% {
				opacity: 0.45;
				transform: scale(0.94);
			}
			50% {
				opacity: 1;
				transform: scale(1.06);
			}
		}

		@keyframes floatAmbient {
			0%,
			100% {
				transform: translate3d(0, 0, 0);
			}
			50% {
				transform: translate3d(0, -18px, 0);
			}
		}

		@keyframes symbolFloat {
			0%,
			100% {
				transform: translate3d(0, 0, 0);
			}
			50% {
				transform: translate3d(0, -3px, 0);
			}
		}

		@keyframes glyphShift {
			0%,
			100% {
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 16px rgba(116, 247, 255, 0.08);
			}
			50% {
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 20px rgba(116, 247, 255, 0.12);
			}
		}

		@keyframes scanline {
			0%,
			100% {
				transform: scaleX(0.76) translateX(0);
				opacity: 0.72;
			}
			50% {
				transform: scaleX(1.04) translateX(0.12em);
				opacity: 1;
			}
		}

		@media (max-width: 920px) {
			.brand-symbol {
				top: 20px;
				left: 20px;
				width: 68px;
				height: 68px;
			}

			.welcome-container {
				padding: 34px 24px 26px;
			}
		}

		@media (max-width: 640px) {
			.page-shell {
				padding: 82px 18px 18px;
			}

			.brand-symbol {
				top: 14px;
				left: 14px;
				width: 62px;
				height: 62px;
				border-radius: 18px;
			}

			.brand-glyph {
				width: 46px;
				height: 46px;
			}

			.welcome-container {
				padding: 28px 18px 22px;
				border-radius: 24px;
			}

			.logo-text {
				font-size: clamp(2.5rem, 15vw, 4rem);
			}

			.description {
				font-size: 1rem;
			}

			.primary-btn,
			.secondary-btn {
				width: 100%;
				text-align: center;
			}
		}

		@media (prefers-reduced-motion: reduce) {
			*,
			*::before,
			*::after {
				animation-duration: 0.01ms !important;
				animation-iteration-count: 1 !important;
				transition-duration: 0.01ms !important;
				scroll-behavior: auto !important;
			}
		}
	</style>
</head>
<body>
	<div class="page-shell">
		<a class="brand-symbol" href="home.html" aria-label="Go to Floscar Vanguard home">
			<div class="brand-glyph" aria-hidden="true"><span></span></div>
		</a>

		<div class="ambient ambient-left"></div>
		<div class="ambient ambient-right"></div>
		<div class="overlay" aria-hidden="true"></div>

		<main class="welcome-container">
			<p class="eyebrow">Welcome / Portfolio / Entry Sequence</p>
			<h1 class="logo-text">FLOSCAR <span>VANGUARD</span></h1>
			<p class="description">
				A clean entry layer for the Floscar Vanguard experience.
			</p>

			<div class="entry-card">
				<p class="entry-copy">
					Enter the main site or jump straight into the live intelligence stream.
				</p>
				<div class="actions">
					<a href="home.html" class="primary-btn">Enter Site</a>
					<a href="trends.html" class="secondary-btn">Open Intelligence Stream</a>
				</div>
			</div>

			<div class="status-bar" aria-live="polite">
				<span class="pulse" aria-hidden="true"></span>
				<span class="status-text" id="status-copy">Signal live. Entry route locked.</span>
			</div>
		</main>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			document.body.classList.add('is-ready');
		});
	</script>
</body>
</html>
