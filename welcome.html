<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="robots" content="noindex,follow">
	<meta name="description" content="Clean welcome sequence for Floscar Vanguard.">
	<meta name="theme-color" content="#061018">
	<link rel="canonical" href="https://www.floscarvanguard.com/">
	<link rel="icon" href="AI.jpg" type="image/jpeg">
	<link rel="manifest" href="site.webmanifest">
	<title>FLOSCAR VANGUARD | Welcome</title>
	<link rel="stylesheet" href="vanguard-welcome.css">
</head>
<body>
	<div class="page-shell">
		<a class="brand-symbol" href="home.html" aria-label="Go to Floscar Vanguard home">
			<div class="brand-glyph" aria-hidden="true"><span></span></div>
		</a>

		<div class="ambient ambient-left"></div>
		<div class="ambient ambient-right"></div>
		<div class="overlay" aria-hidden="true"></div>

		<main class="welcome-container">
			<p class="eyebrow">Welcome / Portfolio / Entry Sequence</p>
			<h1 class="logo-text">FLOSCAR <span>VANGUARD</span></h1>
			<p class="description">
				A clean entry layer for the Floscar Vanguard experience.
			</p>

			<div class="entry-card">
				<p class="entry-copy">
					Enter the main site or jump straight into the live intelligence stream.
				</p>
				<div class="actions">
					<a href="home.html" class="primary-btn">Enter Site</a>
					<a href="trends.html" class="secondary-btn">Open Intelligence Stream</a>
				</div>
			</div>

			<div class="status-bar" aria-live="polite">
				<span class="pulse" aria-hidden="true"></span>
				<span class="status-text" id="status-copy">Signal live. Entry route locked.</span>
			</div>
		</main>
	</div>

	<script src="welcome-logic.js" defer></script>
</body>
</html>
