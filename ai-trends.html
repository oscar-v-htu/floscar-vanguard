<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=trends.html">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#020602">
    <link rel="canonical" href="https://www.floscarvanguard.com/trends.html">
    <link rel="icon" href="AI.jpg" type="image/jpeg">
    <title>AI Trends Archive | Redirecting</title>
    <link rel="stylesheet" href="assets/fv-polish.css">
    <script src="assets/fv-polish.js" defer></script>
    <style>
        :root {
            --bg: #020602;
            --panel: rgba(4, 18, 6, 0.82);
            --panel-border: rgba(51, 255, 51, 0.2);
            --text: #e6ffe3;
            --muted: #9fc89a;
            --accent: #5bff72;
            --accent-soft: rgba(91, 255, 114, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(91, 255, 114, 0.14), transparent 30%),
                linear-gradient(180deg, #061006 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(91, 255, 114, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(91, 255, 114, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        .redirect-card {
            position: relative;
            z-index: 1;
            width: min(100%, 620px);
            padding: 32px 28px;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 0.82rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            font-size: 1rem;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .actions a {
            text-decoration: none;
            color: var(--text);
            padding: 12px 18px;
            border: 1px solid var(--panel-border);
            background: var(--accent-soft);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .actions a:hover {
            transform: translateY(-1px);
            border-color: rgba(91, 255, 114, 0.45);
            background: rgba(91, 255, 114, 0.2);
        }
    </style>
    <script>
        window.location.replace('trends.html');
    </script>
</head>

<body>
    <main class="redirect-card">
        <p class="eyebrow">Archive Route</p>
        <h1>Redirecting To Trends</h1>
        <p>The previous AI Trends page has been replaced by the new Floscar Vanguard intelligence feed. If the redirect
            does not happen automatically, use the link below.</p>
        <div class="actions">
            <a href="trends.html">Open Trends</a>
            <a href="home.html">Return Home</a>
        </div>
    </main>
</body>

</html>
